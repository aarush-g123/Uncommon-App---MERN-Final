services:
  postgres:
    image: postgres:16
    container_name: uncommon-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: uncommon_dev
    volumes:
      - uncommon_pgdata:/var/lib/postgresql/data

volumes:
  uncommon_pgdata:
